[alembic]
# Migrations live here, relative to this file.
script_location = alembic

# The DB URL is set at runtime in alembic/env.py from app.config.settings.
# Leaving this blank prevents Alembic from accidentally falling back to
# a hardcoded value.
sqlalchemy.url =

# Template used by `alembic revision`
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Filesystem encoding & timezone for generated migration files
output_encoding = utf-8
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
